name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ke EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/TugasCloud-cicd
            git pull

            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true

            cd backend
            docker build -t cicd-backend .
            docker run -d -p 5000:5000 cicd-backend

            sudo cp ~/TugasCloud-cicd/frontend/index.html /var/www/html/
            sudo systemctl restart nginx