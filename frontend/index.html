<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicki Yudha | Cloud Architect (Dark Mode)</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Warna Tema Gelap Modern */
            --bg: #121212;             /* Background hitam pekat */
            --text: #e0e0e0;           /* Teks putih abu-abu agar lembut di mata */
            --accent: #1e90ff;         /* Biru aksen yang terang dan kontras */
            --glass: rgba(255, 255, 255, 0.05); /* Efek kaca tipis di background gelap */
            --border: #333333;         /* Warna border yang gelap tapi kelihatan */
            --card-bg: #1e1e1e;        /* Background card sedikit lebih terang dari body */
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Roboto', sans-serif;
            color: var(--text);
            transition: background 0.3s ease;
        }

        /* Background Blob - Biru lembut di belakang */
        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.15), transparent);
            filter: blur(120px);
            z-index: -1;
            top: -150px;
            left: -150px;
        }

        /* Hero Section */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.5rem;
            margin-top: 10px;
            font-weight: 400;
            color: #aaaaaa;
        }

        /* CRUD SECTION */
        .crud {
            padding: 50px 10%;
            max-width: 800px;
            margin: 0 auto;
        }

        .crud h2 {
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            margin-bottom: 25px;
            color: var(--text);
        }

        .form-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1a1a1a;        /* Input background gelap */
            color: var(--text);
            flex-grow: 1;
            min-width: 200px;
        }

        input::placeholder {
            color: #666666;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Tombol Aksi di Card */
        .btn-delete {
            background: #dc3545;       /* Merah untuk Hapus */
            margin-left: 5px;
        }

        .btn-edit {
            background: #ffc107;       /* Kuning untuk Edit */
            color: #121212;            /* Teks gelap di background kuning */
        }

        .card {
            margin-top: 15px;
            padding: 20px;
            border-radius: 15px;
            background: var(--card-bg); /* Card sedikit lebih terang */
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* Shadow lebih gelap */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info b {
            font-size: 1.2rem;
            display: block;
            color: var(--text);
        }

        .card-info span {
            color: #aaaaaa;
        }

        .card-actions {
            display: flex;
            gap: 5px;
        }
    </style>
</head>

<body>

<div class="blob"></div>

<section class="hero">
    <h1>Dicki Yudha</h1>
    <p>Cloud Architect 🚀</p>
</section>

<section class="crud">
    <h2>My Experience</h2>

    <div class="form-container">
        <input id="name" placeholder="Nama Instansi/Proyek">
        <input id="role" placeholder="Role Anda">
        <button onclick="addData()">Tambah</button>
    </div>

    <div id="list"></div>
</section>

<script>
    // PENTING: Menggunakan trik dinamis supaya otomatis deteksi localhost atau IP AWS
    const API = `http://${window.location.hostname}:5000/api/data`;

    function loadData() {
        console.log("Mengambil data dari API:", API);
        fetch(API)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach(item => {
                list.innerHTML += `
                    <div class="card">
                        <div class="card-info">
                            <b>${item.name}</b>
                            <span>${item.role}</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn-edit" onclick="editData(${item.id}, '${item.name}', '${item.role}')">Edit</button>
                            <button class="btn-delete" onclick="deleteData(${item.id})">Hapus</button>
                        </div>
                    </div>
                `;
            });
        })
        .catch(err => {
            console.error("Gagal mengambil data:", err);
            // alert("Gagal mengambil data. Pastikan Backend sudah jalan di Port 5000!");
        });
    }

    function addData() {
        const nameInput = document.getElementById("name");
        const roleInput = document.getElementById("role");
        
        if(!nameInput.value || !roleInput.value) return alert("Isi semua field ya!");

        fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ name: nameInput.value, role: roleInput.value })
        }).then(() => {
            loadData();
            nameInput.value = "";
            roleInput.value = "";
        });
    }

    function deleteData(id) {
        if(confirm("Yakin ingin menghapus data ini?")) {
            fetch(API + "/" + id, { method: "DELETE" })
            .then(() => loadData());
        }
    }

    function editData(id, oldName, oldRole) {
        const name = prompt("Edit Nama:", oldName);
        const role = prompt("Edit Role:", oldRole);

        if(name && role) {
            fetch(API + "/" + id, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ name, role })
            }).then(() => loadData());
        }
    }

    // Jalankan saat pertama kali buka web
    loadData();
</script>

</body>
</html>
