<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleosa Zelda | Cloud Architect</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f172a;
    --text: #f1f5f9;
    --accent: #22c55e;
    --glass: rgba(255,255,255,0.05);
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
}

/* HERO */
.hero {
    height: 70vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    font-size: 20px;
    opacity: 0.7;
}

/* CI/CD BADGE */
.badge {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 30px;
    background: var(--accent);
    color: black;
    font-weight: bold;
}

/* CRUD */
.crud {
    padding: 50px 10%;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    width: 150px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: var(--accent);
    color: black;
    cursor: pointer;
}

/* CARD */
.card {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<section class="hero">
    <h1>🚀 Cleosa Zelda</h1>
    <p>Cloud Architect | DevOps | CI/CD Engineer</p>

    <!-- INI PENANDA DEPLOY -->
    <div class="badge">CI/CD</div>
</section>

<section class="crud">
    <h2>💻 My Experience (Live from Backend)</h2>

    <input id="name" placeholder="Nama">
    <input id="role" placeholder="Role">
    <button onclick="addData()">Tambah</button>

    <div id="list"></div>
</section>

<script>
const API = "http://34.226.119.62:5000/api/data";

function loadData() {
    fetch(API)
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(item => {
            list.innerHTML += `
                <div class="card">
                    <b>${item.name}</b> - ${item.role}
                    <br><br>
                    <button onclick="editData(${item.id}, '${item.name}', '${item.role}')">Edit</button>
                    <button onclick="deleteData(${item.id})">Hapus</button>
                </div>
            `;
        });
    });
}

function addData() {
    const name = document.getElementById("name").value;
    const role = document.getElementById("role").value;

    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, role })
    }).then(() => loadData());
}

function deleteData(id) {
    fetch(API + "/" + id, { method: "DELETE" })
    .then(() => loadData());
}

function editData(id, oldName, oldRole) {
    const name = prompt("Edit Nama:", oldName);
    const role = prompt("Edit Role:", oldRole);

    fetch(API + "/" + id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, role })
    }).then(() => loadData());
}

loadData();
</script>

</body>
</html>
